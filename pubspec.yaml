name: movie_app
description: A cinematic movie browsing app with favorites and genre filtering.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  http: ^1.2.0
  flutter_dotenv: ^5.0.2
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  go_router: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
